packages:
  - 'server'
  - 'web'
  - 'shared'
  - 'cli'
  - 'mcp'
  - 'desktop'

allowBuilds:
  '@scarf/scarf': false
  bcrypt: true
  electron: true
  electron-winstaller: true
  esbuild: true

overrides:
  '@modelcontextprotocol/sdk>express-rate-limit': 8.5.2
  '@xmldom/xmldom': 0.8.13
  fast-uri: '>=3.1.2'
  hono: '>=4.12.18'
  ip-address: '>=10.1.1'
  postcss: '>=8.5.10'
  qs: ^6.14.2
  'uuid@^8.3.0': 11.1.1
  minimatch: '>=10.2.3'
  path-to-regexp: '>=8.4.0'
  tmp: '>=0.2.6'
